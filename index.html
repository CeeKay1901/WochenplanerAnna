<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Wochenplaner — Anna</title>
  <link rel="stylesheet" href="css/style.css">

  <!-- Favicon: simple "W" in warm brown -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23f5f0ea'/><text x='50' y='76' font-family='Georgia,serif' font-size='72' font-weight='bold' text-anchor='middle' fill='%234a3728'>W</text></svg>">
</head>
<body>

<div id="app">

  <!-- ─── Header ─────────────────────────────────────────────────────────── -->
  <header id="app-header">
    <div class="header-top">

      <!-- Month goal (editable) -->
      <div id="month-goal"
           class="header-month-goal"
           contenteditable="true"
           placeholder="April: …"></div>

      <!-- Week nav -->
      <div class="header-center">
        <button id="btn-prev-week" class="btn btn--nav" title="Vorherige Woche">‹</button>
        <span id="header-week-num">KW —</span>
        <button id="btn-next-week" class="btn btn--nav" title="Nächste Woche">›</button>
        <span id="header-day-counter"></span>
      </div>

      <!-- Toolbar buttons -->
      <div class="header-right">
        <button id="btn-template" class="btn" title="Template bearbeiten">Template</button>
        <button id="btn-pdf"      class="btn" title="Als PDF exportieren">PDF ↓</button>
        <button id="btn-backup"   class="btn" title="Backup herunterladen">Backup ↓</button>
        <button id="btn-import"   class="btn" title="Backup importieren">Import</button>
      </div>

    </div>

    <!-- Week goal (editable) -->
    <div class="header-bottom">
      <div id="week-goal"
           contenteditable="true"
           placeholder="Was soll diese Woche erreicht werden?"></div>
    </div>
  </header>

  <!-- ─── Main ─────────────────────────────────────────────────────────── -->
  <div id="main-content">

    <!-- Calendar -->
    <div id="calendar-container">
      <!-- Filled by renderGrid() -->
    </div>

    <!-- Detail Panel (slides in from right) -->
    <aside id="detail-panel">
      <div class="panel-header">
        <div class="panel-title">Block</div>
        <div class="panel-header-actions">
          <button id="panel-delete-btn" class="btn btn--ghost btn--ghost-danger btn--small" title="Block löschen">Löschen</button>
          <button id="panel-close"      class="btn btn--ghost btn--small" title="Panel schließen">✕</button>
        </div>
      </div>
      <div class="panel-body">
        <!-- Filled by openPanel() -->
      </div>
    </aside>

  </div><!-- #main-content -->

</div><!-- #app -->

<!-- ─── Toast container ─────────────────────────────────────────────────── -->
<div id="toast-container"></div>

<!-- ─── Modal overlay ──────────────────────────────────────────────────── -->
<div id="modal-overlay"></div>

<!-- ─── Scripts (order matters!) ──────────────────────────────────────── -->
<script src="libs/idb.umd.js"></script>
<script src="libs/jspdf.umd.min.js"></script>
<script src="libs/html2canvas.min.js"></script>

<script src="js/data.js"></script>
<script src="js/db.js"></script>
<script src="js/render.js"></script>
<script src="js/timer.js"></script>
<script src="js/app.js"></script>

</body>
</html>
